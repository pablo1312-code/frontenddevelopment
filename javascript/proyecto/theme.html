<!DOCTYPE html>
<html lang="en">
<head>
    <title>Theme Architect</title>
    <link rel="stylesheet" href="theme.css">
</head>
<body class="neon">

    <header>
        <h1>Theme Architect</h1>
        <p>Select a mood to transform the document:</p>
        
        <div class="controls">
            <button class="theme-btn" data-theme="light">☀️ Light</button>
            <button class="theme-btn" data-theme="dark">🌙 Dark</button>
            <button class="theme-btn" data-theme="neon">🧪 Neon</button>
            <button class="theme-btn" data-theme="forest">🌲 Forest</button>
        </div>
    </header>

    <main>
        <section class="card">
            <h2>The Power of the DOM</h2>
            <p>Using the <code>document</code> object, we can change the user's experience without ever refreshing the page.</p>
        </section>
    </main>

    <script src="theme.js"></script>
</body>
</html>
